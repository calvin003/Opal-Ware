<style>
:root{
  --bg:#ffffff;
  --text:#14161b;
  --muted:#5b6470;
  --muted2:#8a93a1;
  --green:#16b3a3;
  --green-bright:#0fa294;
  --line:rgba(22,30,48,.12);
  --line-strong:rgba(22,30,48,.22);
  --serif:"Spectral",Georgia,serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#x{position:fixed;inset:0;width:100%;height:100%;z-index:0}
/* page-1 product shot: bracelet turntable + iridescent glow, in the LEFT column (ring stays on the right) */
.product-col{display:flex;flex-direction:column;align-items:center;text-align:center;max-width:440px;animation:contentReveal 1.9s cubic-bezier(.7,0,.2,1) both}
.product-col .sub{margin:0 0 26px;max-width:34ch}
.product-shot{position:relative;width:clamp(120px,16vw,180px);margin-bottom:12px}
.product-glow{position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);width:155%;height:155%;border-radius:50%;z-index:0;pointer-events:none;background:radial-gradient(circle at 50% 45%,rgba(168,200,246,.60),rgba(236,185,226,.46) 38%,rgba(134,219,203,.34) 62%,rgba(247,215,156,.20) 78%,transparent 82%);filter:blur(34px)}
#bracelet{position:relative;z-index:1;width:100%;height:auto;display:block;filter:drop-shadow(0 22px 40px rgba(60,70,90,.18))}

/* nav */
header{position:fixed;top:0;left:0;right:0;z-index:3}
.nav{display:flex;align-items:center;justify-content:flex-end;height:84px;max-width:1280px;margin:0 auto;padding:0 32px;position:relative}
.brand{display:flex;align-items:center;gap:14px;position:absolute;inset:0;margin:auto;width:max-content;height:max-content;text-decoration:none;animation:logoReveal 1.9s cubic-bezier(.7,0,.2,1) both}
.brand .mark{width:44px;height:44px;flex:none}
.brand .name{font-family:var(--serif);font-size:2.2rem;font-weight:500;color:var(--text);line-height:1}
/* intro: logo starts large over the hero, holds ~1s, then retracts to the header centre */
@keyframes logoReveal{0%,52%{transform:translateY(45vh) scale(4.4);pointer-events:none}100%{transform:none;pointer-events:auto}}
/* hero content stays hidden under the logo, then fades in as the logo retracts up */
@keyframes contentReveal{0%,52%{opacity:0}100%{opacity:1}}
@media(prefers-reduced-motion:reduce){.brand,.product-col{animation:none}}
.contact-pill{border:1.5px solid var(--line-strong);border-radius:100px;padding:.75em 1.5em;font-size:.92rem;font-weight:500;color:var(--text);text-decoration:none;transition:.3s var(--ease)}
.contact-pill:hover{border-color:var(--green-bright);color:var(--green-bright)}

/* left-side screens (hero + waitlist) */
.hero-left{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;z-index:2;width:100%;max-width:1280px;margin:0 auto;padding:84px 32px 0}
.hero-nudge{padding-left:clamp(40px,11vw,185px);transform:translate(20px,-20px)}   /* page 1: shift product content a little to the right + a smidget NE */

.preorder-btn{align-self:flex-start;display:inline-flex;align-items:baseline;gap:.5em;border:none;cursor:pointer;text-decoration:none;border-radius:100px;padding:1.05em 2.4em;font-family:var(--sans);font-size:1.12rem;font-weight:600;color:#1b2230;background:linear-gradient(120deg,#86dbcb,#a8c8f6,#ecb9e2,#f7d79c);background-size:180% 180%;animation:opalshift 8s ease infinite;transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.preorder-btn:hover{transform:translateY(-1px);box-shadow:0 12px 30px -12px rgba(120,180,210,.6)}
.preorder-btn .price{font-weight:700;opacity:.85}
.preorder-note{margin-top:16px;font-size:.9rem;color:var(--muted2);align-self:flex-start}

/* colour swatches (decorative) + BUY NOW button */
.buy-block{display:flex;flex-direction:column;align-items:center}
.swatches{display:flex;align-items:center;gap:14px;margin:0 0 16px}
.stock{margin:0 0 6px;font-size:.9rem;color:var(--muted);font-weight:500;white-space:nowrap}
.stock strong{color:var(--text);font-weight:700}
.sw{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;padding:0;transition:transform .2s var(--ease)}
.sw:hover{transform:scale(1.1)}
.sw.is-selected{box-shadow:0 0 0 2px #fff,0 0 0 4px currentColor}
.sw-silver{background:linear-gradient(135deg,#eef0f3,#b4b9c3);color:#aeb3bd}
.sw-gold{background:linear-gradient(135deg,#f6e4a6,#c9a24b);color:#c9a24b}
.buy-btn{align-self:flex-start;display:inline-flex;align-items:center;gap:.9em;background:linear-gradient(120deg,#86dbcb,#a8c8f6,#ecb9e2,#f7d79c);background-size:180% 180%;animation:opalshift 8s ease infinite;color:#1b2230;font-family:var(--sans);font-weight:700;font-size:1.02rem;letter-spacing:.06em;text-transform:uppercase;border-radius:100px;padding:.5em .5em .5em 1.9em;text-decoration:none;box-shadow:0 14px 32px -14px rgba(120,180,210,.55);transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.buy-btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px -14px rgba(120,180,210,.7)}
.buy-arrow{display:grid;place-items:center;width:2.5em;height:2.5em;border-radius:50%;background:#14161b;color:#fff;font-size:1.05rem;flex:none}

.wl-title{font-family:var(--serif);font-weight:400;font-size:clamp(2.2rem,4.6vw,3.6rem);line-height:1.06;letter-spacing:-.015em;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:.6em;background:rgba(22,30,48,.04);border:1px solid var(--line-strong);border-radius:100px;padding:.6em 1.15em;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:#3a7d75;font-weight:600;margin-bottom:34px;align-self:flex-start}
.badge .ef{width:20px;height:20px;border-radius:5px;object-fit:cover;margin:-2px 2px -2px -2px;display:block}
.title{font-family:var(--serif);font-weight:400;font-size:clamp(2.8rem,6.6vw,5.6rem);line-height:1.04;letter-spacing:-.015em;max-width:16ch;color:var(--text)}
.sub{margin:30px 0 40px;font-size:clamp(1.05rem,1.7vw,1.3rem);color:var(--muted);max-width:42ch;line-height:1.6}
.email-slot{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line-strong);border-radius:100px;padding:5px 5px 5px 20px;align-self:flex-start;transition:border-color .3s var(--ease),box-shadow .3s var(--ease)}
.email-slot:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,179,163,.15)}
.email-slot input{border:none;outline:none;background:transparent;font-family:var(--sans);font-size:.95rem;color:var(--text);width:190px}
.email-slot input::placeholder{color:var(--muted2)}
.email-slot button{flex:none;border:none;cursor:pointer;border-radius:100px;padding:.7em 2.6em;display:flex;align-items:center;justify-content:center;color:#1b2230;background:linear-gradient(120deg,#86dbcb,#a8c8f6,#ecb9e2,#f7d79c);background-size:180% 180%;animation:opalshift 8s ease infinite;transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.email-slot button:hover{transform:translateY(-1px);box-shadow:0 10px 26px -12px rgba(120,180,210,.6)}
.email-slot button svg{width:24px;height:20px;display:block}
@keyframes opalshift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.form-msg{margin-top:14px;font-size:.92rem;font-weight:500;min-height:1.2em;opacity:0;transform:translateY(4px);transition:opacity .3s var(--ease),transform .3s var(--ease)}

@media(max-width:680px){
  .nav{padding:0 20px;height:72px}
  .contact-pill{display:none}
  .email-slot input{width:140px}
}

<script>
/* ---------- Waitlist -> Supabase (same project + table the webhook syncs to a Google Sheet) ---------- */
const SUPABASE_URL='https://omfnsjrsswuxkqubagzr.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tZm5zanJzc3d1eGtxdWJhZ3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjk4MjgsImV4cCI6MjA5NjcwNTgyOH0.lJuGVbc3XZRiQoPPIZjtp1bYNezTVrjt4xKF7-sO-AA';
const _db = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
const waitForm=document.getElementById('waitForm'), waitEmail=document.getElementById('waitEmail'), waitMsg=document.getElementById('waitMsg');
const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
function showWaitMsg(t,ok){ waitMsg.textContent=t; waitMsg.style.color=ok?'#1d9e6f':'#d8443c'; waitMsg.classList.add('show'); }
waitForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email=waitEmail.value.trim();
  if(!EMAIL_RE.test(email)){ showWaitMsg('Please enter a valid email.',false); return; }
  if(!_db){ showWaitMsg("Couldn't reach the server — please try again.",false); return; }
  const btn=waitForm.querySelector('button'); btn.disabled=true;
  const { error } = await _db.from('waitlist').insert({ email });
  btn.disabled=false;
  if(error){
    if(error.code==='23505'){ showWaitMsg("You're already on the list ✓",true); waitEmail.value=''; }
    else { console.error(error); showWaitMsg('Something went wrong — please try again.',false); }
    return;
  }
  waitEmail.value=''; showWaitMsg("You're on the list ✓ — we'll be in touch.",true);
});

/* ---------- 3D particle "X" of iridescent X-glyphs: assemble -> hold -> disperse -> reassemble ---------- */
const cv=document.getElementById('x'), cx=cv.getContext('2d');
let W,H,cxC,cyC,scale,parts=[];
const N=1600;
const R=(a,b)=>a+Math.random()*(b-a);

function build(){
  const dpr=Math.min(devicePixelRatio||1,2);
  W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);
  cxC=W*0.72;cyC=H*0.5;scale=Math.min(W,H)*0.30;
  parts=[];
  for(let i=0;i<N;i++){
    // target on a ring (torus): around the ring (u) and around the tube (v)
    const u=R(0,Math.PI*2), v=R(0,Math.PI*2);
    const Rt=0.82, at=0.26, rr=Rt+at*Math.cos(v);
    const tx=rr*Math.cos(u), ty=rr*Math.sin(u), tz=at*Math.sin(v);
    // dispersed cloud position
    parts.push({tx,ty,tz, dx:R(-1.8,1.8), dy:R(-1.8,1.8), dz:R(-1.8,1.8), ph:Math.random(), ox:0,oy:0,ovx:0,ovy:0});
  }
}
build();addEventListener('resize',build);

// cursor "ball" that repels nearby particles
let mx=-9999,my=-9999;
addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; },{passive:true});
addEventListener('mouseleave',()=>{ mx=my=-9999; });

let last=0,t0=-1;
const INTRO=2.8;                              // seconds: expanded pixel cloud -> assembled ring (one time only)
const RAD=38;                                 // blast radius around the cursor
const STR=60;                                 // explosive push strength
function frame(ts){
  requestAnimationFrame(frame);
  if(ts-last<24)return; last=ts;             // ~40fps
  const t=ts*0.001;
  if(t0<0)t0=t;                               // first-frame reference
  // one-time intro: start as an expanded deconstructed pixel cloud, assemble into the ring,
  // then hold at 1 forever -> it never deconstructs again on its own
  let p=Math.min(1,(t-t0)/INTRO);
  p=p*p*(3-2*p);                              // smoothstep ease-in/out

  const yaw=0.30*Math.sin(t*0.4), tilt=0.32;   // gentle wobble only -> never turns edge-on, donut stays open
  const cY=Math.cos(yaw),sY=Math.sin(yaw),cX=Math.cos(tilt),sX=Math.sin(tilt);
  const f=3.4;

  cx.clearRect(0,0,W,H);
  cx.lineCap='round';
  for(const q of parts){
    let pp=p+(q.ph-0.5)*0.28; if(pp<0)pp=0; if(pp>1)pp=1;  // stagger per particle
    // drift the dispersed cloud slowly so it shimmers while scattered
    const dr=t*0.3, amp=(1-pp)*0.14;
    const dx=q.dx+Math.sin(dr+q.ph*6)*amp, dy=q.dy+Math.cos(dr*1.1+q.ph*6)*amp, dz=q.dz+Math.sin(dr*0.9+q.ph*5)*amp;
    let x=dx+(q.tx-dx)*pp, y=dy+(q.ty-dy)*pp, z=dz+(q.tz-dz)*pp;
    // rotate Y, tilt X
    let x1=x*cY+z*sY, z1=-x*sY+z*cY, y1=y;
    let y2=y1*cX-z1*sX, z2=y1*sX+z1*cX, x2=x1;
    const sc=f/(f+z2);
    let sx=cxC+x2*scale*sc, sy=cyC+y2*scale*sc;
    // explosive cursor blast: violent outward kick + turbulence on pixels within the radius,
    // strongest at the centre and falling to zero at the edge
    const ddx=(sx+q.ox)-mx, ddy=(sy+q.oy)-my, dist=Math.hypot(ddx,ddy);
    if(dist<RAD){
      const fk=((RAD-dist)/RAD)*STR/(dist||1);
      q.ovx+=ddx*fk + (Math.random()*2-1)*STR*0.5;   // radial blast + chaotic turbulence
      q.ovy+=ddy*fk + (Math.random()*2-1)*STR*0.5;
    }
    q.ovx+=-0.010*q.ox; q.ovy+=-0.010*q.oy;               // soft spring -> ~3x slower return home
    q.ovx*=0.965; q.ovy*=0.965;                           // light damping -> natural settle
    q.ox+=q.ovx; q.oy+=q.ovy;
    sx+=q.ox; sy+=q.oy;
    const d=Math.min(1,Math.max(0,(z2+1.8)/3.6));        // depth 0(back)..1(front)
    const hue=((q.tx+q.ty)*70 + t*38 + d*60)%360;
    const lig=44+d*22, al=(0.32+d*0.6);
    const e=(2.0+d*2.2)*sc;
    cx.lineWidth=(1.3+d*1.3)*sc;
    cx.strokeStyle='hsla('+(((hue+360)%360)|0)+',82%,'+(lig|0)+'%,'+al.toFixed(2)+')';
    cx.beginPath();
    cx.moveTo(sx-e,sy-e);cx.lineTo(sx+e,sy+e);
    cx.moveTo(sx+e,sy-e);cx.lineTo(sx-e,sy+e);
    cx.stroke();
  }
}
requestAnimationFrame(frame);
</script>

<script>
/* ---------- bracelet turntable: inline rotating product shot in the LEFT column of page 1 ---------- */
(function(){
  const bcv=document.getElementById('bracelet'); if(!bcv) return;
  const bx=bcv.getContext('2d');
  const NF=72, FW=560, FH=607, imgs=[]; let loaded=0, ready=false;
  bcv.width=FW; bcv.height=FH;
  for(let i=0;i<NF;i++){
    const im=new Image();
    im.onload=()=>{ if(++loaded===NF) ready=true; };
    im.src='Resources/bracelet/b'+String(i).padStart(2,'0')+'.webp';
    imgs[i]=im;
  }
  // continuous turntable spin (~18fps -> ~4s per full rotation)
  let bi=0, blast=0;
  function spin(ts){
    requestAnimationFrame(spin);
    if(!ready) return;
    if(ts-blast<55) return; blast=ts;
    bi=(bi+1)%NF;
    bx.clearRect(0,0,FW,FH);
    bx.drawImage(imgs[bi],0,0,FW,FH);
  }
  requestAnimationFrame(spin);
})();
</script>
